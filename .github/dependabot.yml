version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
      # The @lottiefiles/* packages (last, last-builder, relottie,
      # relottie-parse, relottie-stringify) are a version-locked family from
      # one monorepo: the root imports types from `last` and functions from
      # `last-builder`, so bumping any ONE of them alone leaves the tree mixing
      # 1.x/1.y and fails `tsc` with TS2742. Grouping forces them to move
      # together in a single PR (verified: all five to 1.16.0 builds + tests +
      # gates clean).
      lottiefiles:
        patterns:
          - "@lottiefiles/*"
    open-pull-requests-limit: 10
    ignore:
      # lottie-web is pinned to exact 5.13.0 — the most behavior-sensitive dep
      # of the headless render stack; all render-gate verification ran against
      # it. Block major/minor auto-bumps (patch bumps still surface so genuine
      # 5.13.x security fixes aren't hidden). Upgrades are evaluated deliberately.
      - dependency-name: lottie-web
        update-types:
          - version-update:semver-major
          - version-update:semver-minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
